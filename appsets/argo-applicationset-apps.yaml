apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: homecluster-directory-apps
  namespace: argocd
spec:
  generators:
    - list:
        elements:

          # - name: argo-stack
          #   path: argo-stack
          #   namespace: default
          #   createNamespace: "false"

          - name: authelia
            path: authelia
            namespace: authelia
            createNamespace: "true"

          - name: ghcr
            path: ghcr
            namespace: ghcr
            createNamespace: "false"

          - name: ingresses
            path: ingresses
            namespace: default
            createNamespace: "false"

          - name: pihole
            path: pihole
            namespace: pihole
            createNamespace: "true"

  template:
    metadata:
      name: "{{name}}"
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      source:
        repoURL: git@github.com:JacquesEhlers/homecluster.git
        targetRevision: main
        path: "{{path}}"
        directory:
          recurse: true
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace={{createNamespace}}
          - PrunePropagationPolicy=foreground
          - PruneLast=true
      ignoreDifferences:
        - group: discovery.k8s.io
          kind: EndpointSlice
          name: pihole-external-1
          namespace: pihole
          jqPathExpressions:
            - '.endpoints[]?.conditions'
