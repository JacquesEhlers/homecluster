apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: homecluster-helm-charts
  namespace: argocd
spec:
  generators:
    - list:
        elements:

          # - name: argo-events
          #   path: argo-events
          #   namespace: argo-events
          #   createNamespace: "true"

          # - name: argo-workflows
          #   path: argo-workflows
          #   namespace: argo-workflows
          #   createNamespace: "true"

          # - name: awx
          #   path: awx
          #   namespace: awx
          #   createNamespace: "true"

          - name: bazarr
            path: bazarr
            namespace: jmedia
            createNamespace: "false"

          - name: cert-manager
            path: cert-manager
            namespace: cert-manager
            createNamespace: "true"

          - name: flaresolverr
            path: flaresolverr
            namespace: jmedia
            createNamespace: "false"

          - name: gameoflife
            path: game-of-life
            namespace: gameoflife
            createNamespace: "true"

          - name: ingress-nginx
            path: ingress-nginx
            namespace: ingress-nginx
            createNamespace: "true"

          - name: jellyfin
            path: jellyfin
            namespace: jmedia
            createNamespace: "false"

          - name: landing
            path: landing-k8s
            namespace: jmedia
            createNamespace: "false"

          - name: lidarr
            path: lidarr
            namespace: jmedia
            createNamespace: "false"

          - name: jellyseerr
            path: jellyseerr
            namespace: jmedia
            createNamespace: "false"

          - name: metallb
            path: metallb
            namespace: metallb
            createNamespace: "true"

          - name: prowlarr
            path: prowlarr
            namespace: jmedia
            createNamespace: "true"

          - name: qbittorrent
            path: qbittorrent
            namespace: jmedia
            createNamespace: "false"

          - name: radarr
            path: radarr
            namespace: jmedia
            createNamespace: "true"

          - name: sonarr
            path: sonarr
            namespace: jmedia
            createNamespace: "true"

  template:
    metadata:
      name: "{{name}}"
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      source:
        repoURL: git@github.com:JacquesEhlers/homecluster.git
        targetRevision: main
        path: "{{path}}"
        helm:
          valueFiles:
            - values.yaml
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace={{createNamespace}}
          - PrunePropagationPolicy=foreground
          - PruneLast=true
