---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-config
data:
  message: "Hello from ConfigMap"

---
apiVersion: batch/v1
kind: Job
metadata:
  name: presync-job
  annotations:
    argocd.argoproj.io/hook: PreSync
spec:
  template:
    spec:
      containers:
      - name: presync
        image: busybox
        command: ["sh", "-c", "echo PreSync job running; sleep 5"]
      restartPolicy: Never
  backoffLimit: 1

---
apiVersion: batch/v1
kind: Job
metadata:
  name: sync-job
  annotations:
    argocd.argoproj.io/hook: Sync
spec:
  template:
    spec:
      containers:
      - name: sync
        image: busybox
        command: ["sh", "-c", "echo Sync job running; sleep 5"]
      restartPolicy: Never
  backoffLimit: 1

---
apiVersion: batch/v1
kind: Job
metadata:
  name: postsync-job
  annotations:
    argocd.argoproj.io/hook: PostSync
spec:
  template:
    spec:
      containers:
      - name: postsync
        image: busybox
        command: ["sh", "-c", "echo PostSync job running; sleep 5"]
      restartPolicy: Never
  backoffLimit: 1
