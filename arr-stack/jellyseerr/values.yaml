reusable:

  namespace: jmedia

  deployment:

    name: jellyseer

    image: fallenbagel/jellyseerr:latest

    nodeType: config
    ports:
      - name: http
        containerPort: 5055
        protocol: TCP

    volumes:
      - name: config
        podMount: /app/config
        hostMount: /media/jellyseerr/config
        readOnly: false

  service:
    loadBalancerIP: 192.168.2.216

  ingress:
    disabled: false

