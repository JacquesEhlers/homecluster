apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazarr
  namespace: jmedia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bazarr
  template:
    metadata:
      labels:
        app: bazarr
    spec:
      nodeSelector:
        nodes.storage: data
      containers:
        - name: bazarr
          image: linuxserver/bazarr:latest
          ports:
            - containerPort: 6767
          env:
            - name: TZ
              value: "Europe/Amsterdam"
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          volumeMounts:
            - name: bazarr-config
              mountPath: /config
            - name: bazarr-movies
              mountPath: /movies
            - name: bazarr-tv
              mountPath: /tv
      volumes:
        - name: bazarr-config
          hostPath:
            path: /media/bazarr/config
            type: DirectoryOrCreate
        - name: bazarr-movies
          hostPath:
            path: /media/plex/movies
            type: DirectoryOrCreate
        - name: bazarr-tv
          hostPath:
            path: /media/plex/series
            type: DirectoryOrCreate