apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: pihole
    namespace: pihole
    annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
    ingressClassName: nginx
    tls:
        - hosts:
              - pihole.jacquesops.site
          secretName: pihole-tls
    rules:
        - host: pihole.jacquesops.site
          http:
              paths:
                  - path: /admin
                    pathType: Prefix
                    backend:
                        service:
                            name: pihole
                            port:
                                number: 80

                  - path: /api
                    pathType: Prefix
                    backend:
                        service:
                            name: pihole
                            port:
                                number: 80
