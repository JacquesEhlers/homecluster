reusable:

  namespace: jmedia

  deployment:

    name: jellyfin

    image: jellyfin/jellyfin:latest

    nodeType: data

    ports:
      - name: http
        containerPort: 8096
        protocol: TCP
      - name: https
        containerPort: 8920
        protocol: TCP
      - name: discovery
        containerPort: 7359
        protocol: UDP
      - name: dlna
        containerPort: 1900
        protocol: UDP

    volumes:
      - name: config
        podMount: /config
        hostMount: /media/jellyfin/config
        readOnly: false

      - name: cache
        podMount: /cache
        hostMount: /media/jellyfin/cache
        readOnly: false

      - name: movies
        podMount: /media/movies
        hostMount: /media/plex/movies
        readOnly: false

      - name: series
        podMount: /media/series
        hostMount: /media/plex/series
        readOnly: false

      - name: music
        podMount: /media/music
        hostMount: /media/lidarr/music
        readOnly: false

    readinessProbe:
      httpGet:
        path: /
        port: 8096
      initialDelaySeconds: 20
      periodSeconds: 10
    livenessProbe:
      httpGet:
        path: /
        port: 8096
      initialDelaySeconds: 60
      periodSeconds: 20

  service:
    loadBalancerIP: 192.168.2.213

  ingress:
    disabled: false

