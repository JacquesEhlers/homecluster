reusable:

  namespace: jmedia

  deployment:

    name: landing

    image: ghcr.io/jacquesehlers/landing:1.0.3

    nodeType: config
    selfHostedImage: true
    ports:
      - name: http
        containerPort: 80
        protocol: TCP

  service:
    loadBalancerIP: 192.168.2.211

  ingress:
    disabled: false

