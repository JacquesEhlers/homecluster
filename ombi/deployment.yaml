apiVersion: apps/v1
kind: Deployment
metadata:
  name: ombi
  namespace: jmedia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ombi
  template:
    metadata:
      labels:
        app: ombi
    spec:
      nodeSelector:
        nodes.storage: config
      containers:
        - name: ombi
          image: linuxserver/ombi:latest
          ports:
            - containerPort: 3579
          env:
            - name: TZ
              value: "Europe/Amsterdam"
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          volumeMounts:
            - name: ombi-config
              mountPath: /config
            - name: music
              mountPath: /music
            - name: ombi-downloads
              mountPath: /downloads
      volumes:
        - name: ombi-config
          hostPath:
            path: /media/ombi/config
            type: DirectoryOrCreate
