reusable:

  namespace: jmedia

  deployment:

    name: prowlarr

    image: linuxserver/prowlarr:latest

    nodeType: data

    ports:
      - name: http
        containerPort: 9696
        protocol: TCP

    volumes:
      - name: config
        podMount: /config
        hostMount: /media/prowlarr/config
        readOnly: false

  service:
    loadBalancerIP: 192.168.2.219

  ingress:
    disabled: false

