{{- if .Values.deployment.enabled }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: example
spec:
  replicas: {{ .Values.deployment.replicaCount }}

  selector:
    matchLabels:
      app: {{ .Release.Name }}

  template:
    metadata:
      labels:
        app: {{ .Release.Name }}

    spec:
      containers:
        - name: app
          image: "{{ .Values.deployment.image.repository }}:{{ .Values.deployment.image.tag }}"

          ports:
            - containerPort: {{ .Values.deployment.containerPort }}

{{- end }}
